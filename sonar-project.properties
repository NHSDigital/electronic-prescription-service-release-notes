sonar.organization=nhsdigital
sonar.projectKey=NHSDigital_electronic-prescription-service-release-notes
sonar.host.url=https://sonarcloud.io

# Global exclusions
sonar.coverage.exclusions=\
    **/*.test.*, \
    **/tests/**/*, \
    **/schema/*, \
    **/scripts/*, \
    **/__init__.py, \
    packages/preprocessingFunction/app/cli.py, \
    packages/preprocessingFunction/magika_shim.py, \
    eslint.config.mjs, \
    packages/cdk/**, \
    release.config.js

sonar.cpd.exclusions=\
    **/*.test.*, \
    **/tests/**/*, \
    **/scripts/*, \
    eslint.config.mjs, \
    packages/cdk/nagSuppressions.ts

sonar.modules=\
    create_release_notes, \
    mark_jira_released, \
    release_cut

# Modules
create_release_notes.sonar.projectBaseDir=packages/create_release_notes
create_release_notes.sonar.sources=.
create_release_notes.sonar.python.coverage.reportPaths=coverage/coverage.xml

mark_jira_released.sonar.projectBaseDir=packages/mark_jira_released
mark_jira_released.sonar.sources=.
mark_jira_released.sonar.python.coverage.reportPaths=coverage/coverage.xml

release_cut.sonar.projectBaseDir=packages/release_cut
release_cut.sonar.sources=.
release_cut.sonar.python.coverage.reportPaths=coverage/coverage.xml
